<div class="card" *ngIf="jugador">
  
  <div class="grl-box">
    <span class="grl-label">GRL</span>
    <span class="grl-value">{{ jugador.media }}</span>
  </div>

  <img class="player-photo" [src]="obtenerImagenJugador()" alt="Foto del Jugador">

  <div class="name-box">
    <div class="first-name">{{ jugador.nombre | uppercase }}</div>
  </div>

  <div class="club-icon-box">
    <img [src]="obtenerRutaEscudo(jugador.equipo)" alt="Escudo">
  </div>

  <div class="club-name-box">
    {{ jugador.equipo | uppercase }}
  </div>

  <div class="position-box">
    {{ jugador.posicion }}
  </div>

  <div class="stats-row">
     <div class="stat">{{ jugador.parada || 0 }}</div>
     <div class="stat">{{ jugador.ataque || 0 }}</div>
     <div class="stat">{{ jugador.pase || 0 }}</div>
     <div class="stat">{{ jugador.defensa || 0 }}</div>
   </div>

</div>
