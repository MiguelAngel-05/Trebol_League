<main class="main-container">
    <img class="logoTrebol" src="Logos/LogoTrebolLeague.webp" alt="logo de trebol league">
    
    <header class="main-header">
        <div class="header-options top-row">          
            <div class="option-group">
                <img class="icon" src="Utensilios/Emojis/icono-usuario.webp" alt="Usuario">
                <p>{{user?.username || 'Usuario'}}</p>
            </div>
            <span class="separator-header">/</span>
            <div class="option-group">
                <p>{{ dinero | number:'1.0-0':'es-ES' }}</p>
                <img class="icon" src="Utensilios/Emojis/moneda-tc.webp" alt="Moneda TC">
            </div>
        </div>
        
        <div class="header-optionsB bottom-row">
            <div class="option-group icon-hover">
                <img class="pinchar" src="Utensilios/Emojis/flecha-retroceso.webp" alt="Atras" (click)="volverAtras()">
            </div>
            <span class="separator-header">/</span>
            <div class="option-group icon-hover">
                <img class="pinchar" src="Utensilios/Emojis/carta.webp" alt="Chat" title="Centro de Mensajes" (click)="irAChat()">
            </div>
            <span class="separator-header">/</span>
            <div class="option-group icon-hover">
                <img class="pinchar" src="Utensilios/Emojis/carrito-blanco.webp" alt="Tienda" (click)="irATienda()">
            </div>
        </div>

        <div class="div-img-user" (click)="irAPerfil()">
            <img class="img-user" src="{{user?.avatar}}" alt="imagen de usuario" title="Editar Perfil"> 
        </div>
    </header>

    <section class="home-content">
        
        <!-- Tarjeta Grande (Ocupará 2x2 en el grid) -->
        <div class="home-card plantilla glass-panel" (click)="irAPlantilla()">
            <div class="panel-header">
                <h2 class="plantilla-title">Mi Plantilla</h2>
                <div class="badge-plantilla">11 Titulares</div>
            </div>
            <div class="campo-futbol">
                <img src="/Utensilios/Jugadores/plantilla.webp" alt="Campo de fútbol">
            </div>
        </div>

        <!-- Tarjetas Secundarias -->
        <div class="home-card mercado" (click)="irAMercado()">
            <div class="card-overlay"></div>
            <p class="p-card">MERCADO</p> 
        </div>
        
        <div class="home-card calendario" (click)="irACalendario()">
            <div class="card-overlay"></div>
            <p class="p-card">CALENDARIO</p> 
        </div>
        
        <div class="home-card clasificacion" (click)="irAClasificacion()">
            <div class="card-overlay"></div>
            <p class="p-card">CLASIFICACIÓN</p>
        </div>
        
        <div class="home-card jugadores" (click)="irAListaJugadores()">
            <div class="card-overlay"></div>
            <p class="p-card">JUGADORES</p>
        </div>

        <div class="home-card puntos" (click)="irAPuntos()">
            <div class="card-overlay"></div>
            <p class="p-card">PUNTOS</p>
        </div>

    </section>

    @if (notificationMsg) {
        <div class="toast-notification" [class.success]="isSuccess" [class.error]="!isSuccess">
            <div class="toast-icon">
                {{ isSuccess ? '✔' : 'i' }}
            </div>
            <div class="toast-content">
                <p class="toast-title">{{ isSuccess ? '¡Vamos!' : 'Ups...' }}</p>
                <p class="toast-message">{{ notificationMsg }}</p>
            </div>
        </div>
    }

</main>
